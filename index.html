<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pro P&L Calendar</title>
    
    <!-- ไอคอนแอปและเว็บ -->
    <link rel="icon" href="https://fav.farm/📈">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=180&h=180&fit=crop&q=80">

    <!-- นำเข้า Tailwind CSS และ เอฟเฟกต์พลุ -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
    </style>
</head>
<body id="bodyApp" class="dark bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen p-2 md:p-6 font-sans transition-colors duration-300">

    <div class="max-w-4xl mx-auto bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-4 md:p-6 border border-slate-200 dark:border-slate-700 transition-colors duration-300">
        
        <!-- ส่วนหัว แถบเลือกเดือน และสกุลเงิน -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div class="flex flex-wrap items-center gap-3">
                <h1 class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">📈 Pro P&L Calendar</h1>
                <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 transition cursor-pointer text-sm">
                    <span id="themeIcon">☀️ Mode</span>
                </button>
                <select id="currencySelect" onchange="changeCurrency(this.value)" class="p-1.5 rounded-lg bg-slate-200 dark:bg-slate-700 border-none text-xs font-bold cursor-pointer">
                    <option value="$">USD ($)</option>
                    <option value="฿">THB (฿)</option>
                </select>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                <button onclick="changeMonth(-1)" class="px-3 py-1 hover:bg-slate-200 dark:hover:bg-slate-600 rounded text-xl font-bold transition">&lt;</button>
                <span id="currentMonthYear" class="px-4 font-semibold min-w-[120px] text-center">---</span>
                <button onclick="changeMonth(1)" class="px-3 py-1 hover:bg-slate-200 dark:hover:bg-slate-600 rounded text-xl font-bold transition">&gt;</button>
            </div>
        </div>

        <!-- แดชบอร์ดสรุปผลประจำเดือน -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div class="bg-slate-100 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase">Win Rate</p>
                <p id="statWinRate" class="text-xl md:text-2xl font-bold text-amber-600 dark:text-amber-400">0%</p>
            </div>
            <div class="bg-slate-100 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase">Total Trades</p>
                <p id="statTrades" class="text-xl md:text-2xl font-bold text-slate-700 dark:text-slate-200">0 W - 0 L</p>
            </div>
            <div class="bg-slate-100 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase">Monthly Net P&L</p>
                <p id="statNetPnL" class="text-xl md:text-2xl font-bold text-slate-700 dark:text-slate-200">$0</p>
            </div>
            <div class="bg-slate-100 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase">Avg Win / Avg Loss</p>
                <p id="statRatio" class="text-xs md:text-sm font-bold text-slate-600 dark:text-slate-300 mt-1">0 / 0</p>
            </div>
        </div>

        <!-- วันในสัปดาห์ -->
        <div class="calendar-grid text-center font-bold text-xs text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">
            <div class="py-1 text-rose-500">Sun</div><div class="py-1">Mon</div><div class="py-1">Tue</div>
            <div class="py-1">Wed</div><div class="py-1">Thu</div><div class="py-1">Fri</div>
            <div class="py-1 text-emerald-500">Sat</div>
        </div>

        <!-- ตารางปฏิทินระบบสเปกตรัมสี -->
        <div id="calendarDays" class="calendar-grid gap-1 bg-slate-200 dark:bg-slate-750 rounded-xl overflow-hidden min-h-[350px]"></div>

        <!-- แถบสำรองข้อมูลกันหาย -->
        <div class="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700 flex flex-wrap justify-between items-center gap-4">
            <div class="text-xs text-slate-500 dark:text-slate-400">
                *ระบบบันทึกแบบแยกไม้และเก็บโน้ตรูปภาพใน iPad อัตโนมัติ อย่าลืมกด Export สำรองข้อมูลไว้เป็นระยะครับ
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="exportData()" class="bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-xs font-semibold py-2 px-3 rounded transition cursor-pointer text-slate-700 dark:text-slate-200">📥 Export</button>
                <button onclick="document.getElementById('importFile').click()" class="bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-xs font-semibold py-2 px-3 rounded transition cursor-pointer text-slate-700 dark:text-slate-200">📤 Import</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <!-- หน้าต่างป็อปอัปบันทึกข้อมูลขั้นสูง (แก้ไขให้พิมพ์ง่าย ไม่ซับซ้อน รองรับ iPad) -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl text-slate-800 dark:text-slate-100">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h3 class="text-lg font-bold" id="modalTitle">บันทึกการเทรด</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400 font-mono" id="modalFormattedDate"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 font-bold text-xl px-2">×</button>
            </div>

            <!-- โน้ตรวมประจำวัน -->
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">📝 สรุปภาพรวม/อารมณ์วันนี้</label>
                <input type="text" id="dayNote" placeholder="เช่น วันนี้เทรดตามแผนดีมาก ใจเต้นตอนข่าวกระชากนิดหน่อย" 
                       class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 p-2.5 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>

            <!-- รายการไม้ที่เทรด -->
            <div class="border-t border-slate-100 dark:border-slate-700 pt-3">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">📊 รายการแต่ละไม้ (Multi-Trades)</span>
                    <button type="button" onclick="addTradeRow()" class="bg-indigo-600 hover:bg-indigo-500 text-white dark:text-slate-950 font-bold text-xs py-1.5 px-3 rounded-lg transition cursor-pointer">
                        ➕ เพิ่มไม้ (Add Trade)
                    </button>
                </div>
                
                <!-- กล่องใส่แถวแต่ละไม้ -->
                <div id="tradesContainer" class="space-y-3"></div>
            </div>

            <div class="flex gap-2 mt-6 pt-3 border-t border-slate-100 dark:border-slate-700">
                <button onclick="closeModal()" class="w-1/3 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 py-2.5 rounded-xl font-medium transition cursor-pointer text-slate-700 dark:text-slate-200">ยกเลิก</button>
                <button onclick="saveModalData()" class="w-2/3 bg-emerald-600 hover:bg-emerald-500 text-white dark:text-slate-950 py-2.5 rounded-xl font-bold transition cursor-pointer text-center">💾 บันทึกข้อมูลทั้งหมด</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let tradeData = JSON.parse(localStorage.getItem('proCalendarUserData')) || {};
        let currentCurrency = localStorage.getItem('appCurrency') || '$';
        let selectedDateKey = '';

        const monthsTh = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        function initTheme() {
            const savedTheme = localStorage.getItem('appTheme') || 'dark';
            const body = document.getElementById('bodyApp');
            if (savedTheme === 'dark') { body.classList.add('dark'); document.getElementById('themeIcon').innerText = '☀️ Light Mode'; } 
            else { body.classList.remove('dark'); document.getElementById('themeIcon').innerText = '🌙 Dark Mode'; }
            document.getElementById('currencySelect').value = currentCurrency;
        }

        function toggleTheme() {
            const body = document.getElementById('bodyApp');
            if (body.classList.contains('dark')) {
                body.classList.remove('dark'); document.getElementById('themeIcon').innerText = '🌙 Dark Mode'; localStorage.setItem('appTheme', 'light');
            } else {
                body.classList.add('dark'); document.getElementById('themeIcon').innerText = '☀️ Light Mode'; localStorage.setItem('appTheme', 'dark');
            }
        }

        function changeCurrency(val) { currentCurrency = val; localStorage.setItem('appCurrency', val); renderCalendar(); }

        // ฟังก์ชันคำนวณสเปกตรัมสีตามจำนวนเงิน (ยิ่งกำไรเยอะยิ่งเขียวเข้ม ขาดทุนเยอะยิ่งแดงเข้ม)
        function getSpectrumClass(pnl) {
            if (pnl === 0) return 'bg-slate-200 dark:bg-slate-700 border border-slate-400 text-slate-700 dark:text-slate-300';
            if (pnl > 0) {
                if (pnl < 500) return 'bg-emerald-100 dark:bg-emerald-950/40 border border-emerald-300 dark:border-emerald-900 text-emerald-600 dark:text-emerald-400';
                if (pnl < 2000) return 'bg-emerald-200 dark:bg-emerald-950/70 border border-emerald-400 dark:border-emerald-700 text-emerald-700 dark:text-emerald-300';
                return 'bg-emerald-300 dark:bg-emerald-900 border border-emerald-500 text-emerald-900 dark:text-emerald-200 font-extrabold'; // Big Win
            } else {
                const absPnl = Math.abs(pnl);
                if (absPnl < 500) return 'bg-rose-100 dark:bg-rose-950/40 border border-rose-300 dark:border-rose-900 text-rose-600 dark:text-rose-400';
                if (absPnl < 2000) return 'bg-rose-200 dark:bg-rose-950/70 border border-rose-400 dark:border-rose-700 text-rose-700 dark:text-rose-300';
                return 'bg-rose-300 dark:bg-rose-900 border border-rose-500 text-rose-900 dark:text-rose-200 font-extrabold'; // Big Loss
            }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('currentMonthYear').innerText = `${monthsTh[month]} ${year + 543}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            for (let i = firstDayIndex; i > 0; i--) {
                const day = prevTotalDays - i + 1;
                calendarDays.innerHTML += `<div class="bg-slate-100/50 dark:bg-slate-800/20 text-slate-300 dark:text-slate-600 p-2 min-h-[85px] border border-slate-200/30 dark:border-slate-800/40 text-xs">${day}</div>`;
            }

            let monthlyWins = 0, monthlyLosses = 0, monthlyNet = 0, winSum = 0, lossSum = 0, totalMonthTradesCount = 0;

            for (let day = 1; day <= totalDays; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayData = tradeData[dateKey] || null;
                
                let pnlDisplay = '';
                let iconsDisplay = '';
                let bgClass = 'bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700/50 text-slate-800 dark:text-slate-100';

                if (dayData && dayData.trades && dayData.trades.length > 0) {
                    let dayTotalPnL = 0;
                    let hasImages = false;

                    dayData.trades.forEach(t => {
                        dayTotalPnL += t.pnl;
                        if (t.imgUrl && t.imgUrl.trim() !== '') hasImages = true;
                        totalMonthTradesCount++;
                    });

                    monthlyNet += dayTotalPnL;
                    if (dayTotalPnL > 0) { monthlyWins++; winSum += dayTotalPnL; pnlDisplay = `+${dayTotalPnL}`; } 
                    else if (dayTotalPnL < 0) { monthlyLosses++; lossSum += dayTotalPnL; pnlDisplay = `${dayTotalPnL}`; }
                    else { pnlDisplay = `0`; }

                    bgClass = getSpectrumClass(dayTotalPnL);
                    
                    // ไอคอนแสดงสถานะ (สมุดโน้ต / รูปภาพ) บนช่องปฏิทิน
                    const noteIcon = dayData.dayNote ? '📝' : '';
                    const imgIcon = hasImages ? '🖼️' : '';
                    iconsDisplay = `<span class="float-right text-[10px] opacity-80">${noteIcon}${imgIcon}</span>`;
                }

                calendarDays.innerHTML += `
                    <div onclick="openModal('${dateKey}', '${day}')" class="p-1.5 md:p-2 min-h-[85px] ${bgClass} cursor-pointer transition flex flex-col justify-between text-left group">
                        <div class="w-full">
                            ${iconsDisplay}
                            <span class="text-xs font-bold ${dayData ? '' : 'text-slate-400 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200'}">${day}</span>
                        </div>
                        <span class="text-[10px] md:text-xs font-mono font-bold truncate">${pnlDisplay ? currentCurrency + pnlDisplay : ''}</span>
                    </div>
                `;
            }

            document.getElementById('statWinRate').innerText = `${totalMonthTradesCount > 0 ? ((monthlyWins / (monthlyWins+monthlyLosses || 1)) * 100).toFixed(1) : 0}%`;
            document.getElementById('statTrades').innerText = `${monthlyWins} วันเขียว - ${monthlyLosses} วันแดง`;
            
            const netElem = document.getElementById('statNetPnL');
            netElem.innerText = (monthlyNet >= 0 ? '+' : '') + currentCurrency + monthlyNet.toLocaleString();
            netElem.className = `text-xl md:text-2xl font-bold ${monthlyNet >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}`;

            const avgWin = monthlyWins > 0 ? Math.round(winSum / monthlyWins) : 0;
            const avgLoss = monthlyLosses > 0 ? Math.round(lossSum / monthlyLosses) : 0;
            document.getElementById('statRatio').innerText = `+${currentCurrency}${avgWin.toLocaleString()} / ${currentCurrency}${avgLoss.toLocaleString()}`;
        }

        function changeMonth(direction) { currentDate.setMonth(currentDate.getMonth() + direction); renderCalendar(); }

        // ฟังก์ชันสร้างหน้าต่างบันทึกไม้ (สามารถกดเพิ่มกี่ไม้ก็ได้)
        function addTradeRow(pair = '', pnl = '', note = '', imgUrl = '') {
            const container = document.getElementById('tradesContainer');
            const rowId = 'trade-row-' + Date.now() + Math.random().toString(36).substr(2, 5);
            
            const rowHtml = `
                <div id="${rowId}" class="trade-row bg-slate-100 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-750 relative group/row">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-rose-500 text-xs font-bold opacity-60 hover:opacity-100">ลบไม้นี้ 🗑️</button>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2 pt-2">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-0.5">Asset / คู่เงิน</label>
                            <input type="text" placeholder="เช่น EURUSD" value="${pair}" class="trade-pair w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1.5 rounded-lg text-xs uppercase">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-400 mb-0.5">P&L (กำไรใส่ +, ขาดทุนใส่ -)</label>
                            <input type="number" placeholder="เช่น 1500 หรือ -500" value="${pnl}" class="trade-pnl w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1.5 rounded-lg text-xs font-mono font-bold">
                        </div>
                    </div>
                    
                    <div class="space-y-1.5">
                        <input type="text" placeholder="📝 โน้ตแผนหรือความรู้สึกของไม้นี้..." value="${note}" class="trade-note w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1.5 rounded-lg text-xs">
                        <input type="text" placeholder="🔗 แปะลิงก์รูปภาพกราฟ (จาก Discord / เว็บฝากรูป)" value="${imgUrl}" oninput="previewImage(this)" class="trade-img w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 p-1.5 rounded-lg text-xs font-mono">
                        <div class="img-preview-container hidden mt-1 max-h-32 overflow-hidden rounded-lg border border-slate-200 dark:border-slate-700 bg-black/10">
                            <img src="${imgUrl}" class="w-full object-contain max-h-32" onerror="this.parentElement.classList.add('hidden')">
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
            
            // ถ้ามีลิงก์รูปส่งมาให้โชว์พรีวิวทันที
            if (imgUrl) {
                const lastRow = container.lastElementChild;
                lastRow.querySelector('.img-preview-container').classList.remove('hidden');
            }
        }

        function previewImage(input) {
            const container = input.parentElement.querySelector('.img-preview-container');
            const img = container.querySelector('img');
            if (input.value.trim() !== '') {
                img.src = input.value;
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function openModal(dateKey, day) {
            selectedDateKey = dateKey;
            document.getElementById('modalTitle').innerText = `บันทึกการเทรดวันที่ ${day}`;
            document.getElementById('modalFormattedDate').innerText = dateKey;
            document.getElementById('tradesContainer').innerHTML = '';
            
            const dayData = tradeData[dateKey];
            if (dayData) {
                document.getElementById('dayNote').value = dayData.dayNote || '';
                if (dayData.trades && dayData.trades.length > 0) {
                    dayData.trades.forEach(t => addTradeRow(t.pair, t.pnl, t.note, t.imgUrl));
                } else {
                    addTradeRow(); // เปิดแถวเปล่า 1 แถวให้กรอกง่ายๆ
                }
            } else {
                document.getElementById('dayNote').value = '';
                addTradeRow(); // เปิดแถวเปล่า 1 แถว
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveModalData() {
            const dayNoteValue = document.getElementById('dayNote').value;
            const rowElements = document.querySelectorAll('.trade-row');
            
            let tradesArray = [];
            let dayTotalPnL = 0;

            rowElements.forEach(row => {
                const pair = row.querySelector('.trade-pair').value;
                const pnlVal = row.querySelector('.trade-pnl').value;
                const note = row.querySelector('.trade-note').value;
                const imgUrl = row.querySelector('.trade-img').value;

                if (pnlVal !== '') {
                    const pnl = parseFloat(pnlVal);
                    dayTotalPnL += pnl;
                    tradesArray.push({ pair, pnl, note, imgUrl });
                }
            });

            // ถ้าไม่มีทั้งโน้ตและไม่มีไม้การเทรด ให้ลบข้อมูลวันนั้นออก
            if (dayNoteValue.trim() === '' && tradesArray.length === 0) {
                delete tradeData[selectedDateKey];
            } else {
                tradeData[selectedDateKey] = { dayNote: dayNoteValue, trades: tradesArray };
                
                // ยิงพลุถ้าผลรวมทั้งวันเป็นบวก (กำไร)
                if (dayTotalPnL > 0) {
                    confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
                }
            }

            localStorage.setItem('proCalendarUserData', JSON.stringify(tradeData));
            closeModal();
            renderCalendar();
        }

        // --- ระบบ Export/Import ข้อมูลสำรอง ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tradeData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `PRO_PL_Calendar_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (typeof importedData === 'object') {
                        tradeData = importedData; localStorage.setItem('proCalendarUserData', JSON.stringify(tradeData));
                        renderCalendar(); alert('นำเข้าข้อมูลสำเร็จแล้วครับ!');
                    }
                } catch (err) { alert('ไฟล์ไม่ถูกต้องครับ'); }
            };
            reader.readAsText(file);
        }

        initTheme();
        renderCalendar();
    </script>
</body>
